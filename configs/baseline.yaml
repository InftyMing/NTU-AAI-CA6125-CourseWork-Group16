seed: 42
n_splits: 5
debug_rows: null
data:
  train_path: data/raw/train.csv
  test_path: data/raw/test.csv
  sample_submission_path: data/raw/sample_submission.csv
output:
  artifacts_dir: experiments/artifacts
  submissions_dir: experiments/submissions
models:
  mean:
    enabled: true
  ridge_tfidf:
    enabled: true
    word_max_features: 60000
    char_max_features: 80000
    ridge_alpha: 6.0
  svr_tfidf:
    enabled: false
    max_train_rows: 3911
    C: 1.0
    epsilon: 0.05
  lightgbm_features:
    enabled: true
    n_estimators: 500
    learning_rate: 0.03
    num_leaves: 31
